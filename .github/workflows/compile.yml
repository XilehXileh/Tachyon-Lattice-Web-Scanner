name: Build Web Lattice
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14 # The "Gold Standard" for 2026
        with:
          version: latest

      - name: Verify Files
        run: ls -R # This logs exactly what the server sees to the terminal

      - name: Geometric Web Compilation
        run: |
          emcc lattice_engine.cpp -o engine.js -O3 --bind -s WASM=1 -s ALLOW_MEMORY_GROWTH=1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
          
