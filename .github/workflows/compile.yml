name: Build Web Lattice
on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten (Direct)
        run: |
          mkdir emsdk-repo
          cd emsdk-repo
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git .
          ./emsdk install latest
          ./emsdk activate latest

      - name: Compile C++ to WASM
        run: |
          source ./emsdk-repo/emsdk_env.sh
          emcc lattice_engine.cpp -o engine.js -O3 --bind -s WASM=1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
