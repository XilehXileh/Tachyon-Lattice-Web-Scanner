name: Build Web Lattice
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code & Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Setup Emscripten Cache
        uses: actions/cache@v4
        with:
          path: emsdk/
          key: ${{ runner.os }}-emsdk-${{ hashFiles('.gitmodules') }}

      - name: Initialize Emscripten
        run: |
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Geometric Web Compilation
        run: |
          source ./emsdk/emsdk_env.sh
          # Optimizing for O3 (High Performance) to match silicon lanes
          emcc lattice_engine.cpp -o engine.js -O3 --bind -s WASM=1 -s ALLOW_MEMORY_GROWTH=1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
