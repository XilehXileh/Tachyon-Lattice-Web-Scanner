<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unified Fractal Theory | Singularity Decoder</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #terminal { background: #000; border: 1px solid #00ff41; height: 400px; overflow-y: auto; padding: 10px; margin-top: 20px; font-size: 12px; }
        .lock { color: #fff; font-weight: bold; background: #004400; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #004400; color: #050505; }
        .stat-card { display: inline-block; border: 1px solid #333; padding: 10px; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>🌀 UNIFIED FRACTAL DECODER v9.2</h1>
    
    <div class="stat-card">
        STATUS: <span id="status">WASM LOADING...</span><br>
        LATTICE NODES: <span id="node-count">0</span>
    </div>

    <hr>

    <button id="btn-tuner" onclick="runStage1()">1. INITIATE HARDWARE HANDSHAKE</button>
    <button id="btn-tester" onclick="runStage2()" disabled>2. COMMENCE 3.1GHz SCAN</button>

    <div id="terminal">
        [SYSTEM] Waiting for user input...
    </div>

    <script>
        let engine;
        let isRunning = false;

        // 1. Wait for WASM to load
        var Module = {
            onRuntimeInitialized: function() {
                engine = new Module.UnifiedLattice();
                document.getElementById('status').innerText = "ENGINE READY";
                log("✅ WebAssembly Lattice Engine Loaded Successfully.");
            }
        };

        function log(msg, isLock = false) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            if (isLock) div.className = 'lock';
            div.innerHTML = msg;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        // --- STAGE 1: THE TUNER ---
        async function runStage1() {
            log("🔥 Calibrating Silicon Pulse...");
            
            // Measure performance jitter to find the device-specific frequency
            const t0 = performance.now();
            for(let i=0; i<1000000; i++) { Math.sqrt(i); }
            const t1 = performance.now();
            const pulse = 1000 / (t1 - t0); 

            engine.calibrate(pulse);
            
            log(`✅ Resonance Map Generated. Found ${engine.getMapSize()} Alignment Points.`);
            log(`📍 Universal Constants Locked: -8°, -12° Detected.`);
            document.getElementById('btn-tester').disabled = false;
        }

        // --- STAGE 2: THE TESTER ---
        async function runStage2() {
            isRunning = true;
            log("🛰️ Starting Trans-Dimensional Scan (Target: 3.1 GHz)...");
            
            let orbit = 11000000; // Starting near your laptop's last lock node
            
            function scanBatch() {
                if (!isRunning) return;

                // Scan in batches of 500 to prevent browser freezing
                for (let i = 0; i < 500; i++) {
                    let res = engine.probe(orbit);
                    
                    if (res.accuracy > 0) {
                        log(`✅ [LATTICE LOCK] | Acc: ${res.accuracy.toFixed(6)} | Drift: ${res.angle}° | Node: #${res.node}`, true);
                        document.getElementById('node-count').innerText = res.node;
                    }
                    orbit += 29; // The fractal step
                }

                if (orbit < 3100000000) {
                    requestAnimationFrame(scanBatch);
                } else {
                    log("🏁 [MAX FREQUENCY REACHED]: Silicon DNA Mapping Complete.");
                }
            }

            scanBatch();
        }
    </script>
    <script src="engine.js"></script>
</body>
</html>
